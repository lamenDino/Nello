services:
  - type: web
    name: tiktok-telegram-bot
    env: docker
    region: frankfurt
    plan: free
    dockerfilePath: Dockerfile
    envVars:
      - key: TELEGRAM_BOT_TOKEN
      - key: ADMIN_USER_ID
      - key: LOG_LEVEL
        value: INFO
      - key: TEMP_DIR
        value: /tmp
      # Credenziali Firebase: incolla qui il JSON del service account (sync: false
      # = lo imposti dalla dashboard, non viene committato nel repo).
      # In alternativa carica un Secret File in /etc/secrets/firebase_credentials.json
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
